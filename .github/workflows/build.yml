name: Build Crux Client Installer

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      upload-to:
        description: 'Repo to upload artifacts to (e.g. Dev-Reds/website-nuxt)'
        required: false
        default: ''
      release-tag:
        description: 'Release tag to upload to (e.g. v1.0.0)'
        required: false
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx electron-builder --win --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: Crux-Client-Windows-Installer
          path: installer/Crux-Client-Windows-Installer.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx electron-builder --linux --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: Crux-Client-Linux
          path: installer/Crux-Client-Linux-x64.*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx electron-builder --mac --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: Crux-Client-Mac
          path: installer/Crux-Client-Mac-x64.*

  create-release-zip:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: Crux-Client-*
          merge-multiple: true
      - name: Create release zip
        run: |
          mkdir -p release
          mv *.exe release/ 2>/dev/null || true
          mv *.zip release/ 2>/dev/null || true
          mv *.tar.gz release/ 2>/dev/null || true
          mv *.dmg release/ 2>/dev/null || true
          cd release
          zip -9 -r ../Crux-Client-Installer-All.zip ./*
      - uses: actions/upload-artifact@v4
        with:
          name: Crux-Client-Installer-All
          path: Crux-Client-Installer-All.zip

  upload-to-release:
    needs: [create-release-zip]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Crux-Client-Installer-All
      - uses: actions/download-artifact@v4
        with:
          name: Crux-Client-Windows-Installer
      - uses: actions/download-artifact@v4
        with:
          name: Crux-Client-Linux
      - uses: actions/download-artifact@v4
        with:
          name: Crux-Client-Mac
      - name: Upload to Release (crux-client)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Crux-Client-Installer-All.zip
            *.exe
            *.zip
            *.tar.gz
            *.dmg
          fail_on_unmatched_files: false

  upload-to-website-nuxt:
    needs: [build-windows, build-linux, build-macos]
    if: github.event_name == 'workflow_dispatch' && inputs.upload-to != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: Crux-Client-*
          merge-multiple: true
      - name: Upload to external repo release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="${{ inputs.release-tag }}"
          for f in *.exe *.zip *.tar.gz *.dmg; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber -R "${{ inputs.upload-to }}" || true
          done

  upload-crux-code-zip:
    needs: [build-windows, build-linux, build-macos]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create crux_code.zip
        run: |
          zip --symlinks -9 -r crux_code.zip .
      - name: Upload to crux-code release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" crux_code.zip --clobber -R "Dev-Reds/crux-code" || \
          gh release create "$TAG" crux_code.zip --title "Crux Code $TAG" --notes "Autogenerated source zip" -R "Dev-Reds/crux-code"
